name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.7", "3.8", "3.9"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check import
        run: |
          python -c "from model import MINet; print('MINet import successful')"
          python -c "import data_loader; print('data_loader import successful')"
          python -c "import pytorch_ssim; print('pytorch_ssim import successful')"

      - name: Quick model forward test
        run: |
          python -c "
          import torch
          from model import MINet
          net = MINet()
          x = torch.randn(1, 3, 368, 368)
          d1, d2, d3, d4, d5 = net(x)
          print(f'Output shapes: {d1.shape}, {d2.shape}, {d3.shape}, {d4.shape}, {d5.shape}')
          print('Forward pass OK')
          "

      - name: Count parameters
        run: |
          python -c "
          import torch
          from model import MINet
          net = MINet()
          total_params = sum(p.numel() for p in net.parameters())
          trainable_params = sum(p.numel() for p in net.parameters() if p.requires_grad)
          print(f'Total parameters: {total_params:,}')
          print(f'Trainable parameters: {trainable_params:,}')
          "
